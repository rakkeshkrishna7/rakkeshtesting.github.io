<!DOCTYPE html>
<html>
<head>

<title>Rakkesh | Stock Portfolio</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#0a0a0a;
color:white;
overflow-x:hidden;
}

/* HERO SECTION */

.hero{
height:100vh;
background:url("https://wallpapercave.com/wp/wp7122806.jpg");
background-size:cover;
background-position:center;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1{
font-size:70px;
color:#ff1a1a;
text-shadow:0 0 20px red;
}

.hero p{
font-size:22px;
margin-top:10px;
color:#ddd;
}

/* WEB LINE */

.web{
width:2px;
height:120px;
background:white;
margin-top:20px;
animation:swing 2s infinite alternate;
}

@keyframes swing{
from{transform:rotate(-5deg)}
to{transform:rotate(5deg)}
}

/* SECTION */

.section{
padding:80px 10%;
text-align:center;
}

.section h2{
font-size:40px;
margin-bottom:40px;
color:#ff2b2b;
}

/* STOCK CARDS */

.cards{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:30px;
}

.card{
background:#111;
padding:30px;
border-radius:15px;
width:250px;
transition:0.3s;
border:2px solid #1a1a1a;
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 0 20px red;
border-color:red;
}

.card h3{
margin-bottom:10px;
}

/* BUTTON */

button{
background:red;
border:none;
padding:12px 25px;
border-radius:8px;
color:white;
cursor:pointer;
font-size:16px;
margin-top:20px;
}

button:hover{
background:#ff3c3c;
}

/* FOOTER */

footer{
background:black;
text-align:center;
padding:30px;
margin-top:40px;
color:#aaa;
}

</style>

</head>

<body>

<div class="hero">

<h1>Rakkesh</h1>
<p>Age 23 | Stock Market Portfolio</p>

<div class="web"></div>

</div>

<section class="section">

<h2>My Stock Portfolio</h2>

<div class="cards">

<div class="card">
<h3>Reliance</h3>
<p>Sector: Energy</p>
<p>Strategy: Long Term</p>
</div>

<div class="card">
<h3>TCS</h3>
<p>Sector: IT</p>
<p>Strategy: Growth</p>
</div>

<div class="card">
<h3>HDFC Bank</h3>
<p>Sector: Banking</p>
<p>Strategy: Swing</p>
</div>

<div class="card">
<h3>Infosys</h3>
<p>Sector: IT</p>
<p>Strategy: Long Term</p>
</div>

</div>

<button onclick="spiderAlert()">Activate Spider Sense</button>

<p id="alertText" style="margin-top:20px"></p>

</section>

<footer>

<p>🕷 Built by Rakkesh | Stock Market Explorer</p>

</footer>

<script>

function spiderAlert(){

let messages = [

"📈 Spider Sense: Bullish market detected!",
"⚠ Spider Sense: Volatility incoming!",
"🕷 Spider Sense: Perfect buying opportunity!",
"💰 Spider Sense: Hold your positions!"

];

let random = Math.floor(Math.random()*messages.length);

document.getElementById("alertText").innerText = messages[random];

}

</script>

</body>
</html>
