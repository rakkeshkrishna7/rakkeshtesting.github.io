<!DOCTYPE html>
<html>
<head>

<title>Rakkesh | Spectacular Portfolio</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{

background:linear-gradient(135deg,#0a0f2c,#c10000);
color:white;
overflow-x:hidden;

}

/* SPIDER WEB BACKGROUND */

body::before{

content:"";
position:fixed;
width:100%;
height:100%;
background:url("https://www.transparenttextures.com/patterns/spider-web.png");
opacity:0.15;
z-index:-1;

}

/* HERO */

.hero{

height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;

background-image:
linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.7)),
url("https://wallpaperaccess.com/full/3937350.jpg");

background-size:cover;
background-position:center;

}

.hero h1{

font-size:70px;
color:#ff3030;
text-shadow:0 0 20px red;

}

.hero span{

color:#3aa0ff;

}

.hero p{

margin-top:10px;
font-size:22px;
color:#ccc;

}

/* WEB LINE */

.web{

width:3px;
height:150px;
background:white;
margin-top:20px;
animation:swing 2s infinite alternate;

}

@keyframes swing{

from{transform:rotate(-6deg)}
to{transform:rotate(6deg)}

}

/* SECTION */

.section{

padding:80px 10%;
text-align:center;

}

.section h2{

font-size:42px;
color:#3aa0ff;
margin-bottom:40px;

}

/* STOCK CARDS */

.cards{

display:flex;
flex-wrap:wrap;
justify-content:center;
gap:30px;

}

.card{

background:#111;
padding:30px;
width:250px;
border-radius:15px;
border:2px solid #222;
transition:.3s;

}

.card:hover{

transform:translateY(-10px);
box-shadow:0 0 20px red,0 0 20px blue;

}

.card h3{

color:#ff4040;

}

/* SPIDER IMAGE SECTION */

.spider{

text-align:center;
padding:60px;

}

.spider img{

width:300px;
transition:.4s;

}

.spider img:hover{

transform:scale(1.1) rotate(5deg);

}

/* BUTTON */

button{

background:#ff2020;
border:none;
padding:14px 30px;
border-radius:10px;
color:white;
font-size:16px;
cursor:pointer;
margin-top:20px;

}

button:hover{

background:#3aa0ff;

}

/* FOOTER */

footer{

background:#000;
text-align:center;
padding:30px;
color:#aaa;

}

</style>

</head>

<body>

<div class="hero">

<h1>Rakkesh <span>Portfolio</span></h1>

<p>Age 23 | Stock Market Explorer</p>

<div class="web"></div>

</div>

<section class="section">

<h2>My Stock Portfolio</h2>

<div class="cards">

<div class="card">
<h3>Reliance</h3>
<p>Energy Sector</p>
<p>Long Term</p>
</div>

<div class="card">
<h3>TCS</h3>
<p>IT Sector</p>
<p>Growth</p>
</div>

<div class="card">
<h3>HDFC Bank</h3>
<p>Banking</p>
<p>Swing Trade</p>
</div>

<div class="card">
<h3>Infosys</h3>
<p>IT Sector</p>
<p>Long Term</p>
</div>

</div>

<button onclick="spiderSense()">Activate Spider Sense</button>

<p id="sense" style="margin-top:15px;"></p>

</section>

<div class="spider">

<img src="https://wallpaperaccess.com/full/3937350.jpg">

</div>

<footer>

🕷 Spectacular Portfolio by Rakkesh

</footer>

<script>

function spiderSense(){

let msg=[

"📈 Spider Sense: Bullish market incoming!",
"⚠ Spider Sense: Volatility detected!",
"💰 Spider Sense: Buying opportunity!",
"🕸 Spider Sense: Hold your positions!"

];

let r=Math.floor(Math.random()*msg.length);

document.getElementById("sense").innerText=msg[r];

}

</script>

</body>
</html>
